name: Release

on:
  push:
    tags:
      - 'menubar-v*'

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  release:
    runs-on: macos-14

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11.3.0

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: 'false'
        run: pnpm -F @tidal/menubar dist

      - uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            apps/menubar/release/Tidal-*.dmg
            apps/menubar/release/Tidal-*.zip
