  html, body { margin: 0; padding: 0; height: 100%; }
  #root { height: 100vh; }
  body { font-family: 'Inter', 'PingFang SC', system-ui, sans-serif;
    background: #faf9f6; -webkit-font-smoothing: antialiased; }
  ::selection { background: rgba(91,79,212,0.18); }
  @keyframes syncspin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: no-preference) {
    .sync-modal-in { animation: syncmodal .2s cubic-bezier(.2,.7,.3,1); }
    @keyframes syncmodal { from { transform: translateY(-8px); } to { transform: translateY(0); } }
    .sync-sheet-in { animation: syncsheet .26s cubic-bezier(.22,.61,.36,1); }
    @keyframes syncsheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
  }
  .sync-row { transition: background .1s ease; }
  .sync-row:not(:disabled):hover { background: rgba(120,110,100,0.06) !important; }
</style>
