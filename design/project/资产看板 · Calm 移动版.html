<!doctype html>
<html lang="zh-CN">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
<title>我的资产看板 · Calm 移动版</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
<style>
  html, body { margin: 0; padding: 0; height: 100%; }
  #root { height: 100vh; height: 100dvh; }
  body { font-family: 'PingFang SC', 'Inter', system-ui, -apple-system, sans-serif;
    background: #e9e6df; -webkit-font-smoothing: antialiased; overscroll-behavior: none; }
  * { -webkit-tap-highlight-color: transparent; }
  ::selection { background: rgba(91,79,212,0.18); }
  button { -webkit-tap-highlight-color: transparent; }
  @keyframes msheet-in { from { transform: translateY(100%); } to { transform: translateY(0); } }
  @keyframes mspin { to { transform: rotate(360deg); } }
  @keyframes syncspin { to { transform: rotate(360deg); } }
  @media (prefers-reduced-motion: no-preference) {
    .sync-modal-in { animation: syncmodal .2s cubic-bezier(.2,.7,.3,1); }
    @keyframes syncmodal { from { transform: translateY(-8px); } to { transform: translateY(0); } }
    .sync-sheet-in { animation: syncsheet .26s cubic-bezier(.22,.61,.36,1); }
    @keyframes syncsheet { from { transform: translateY(100%); } to { transform: translateY(0); } }
  }
  .sync-row { transition: background .1s ease; }
  .sync-row:not(:disabled):hover { background: rgba(120,110,100,0.06) !important; }
  /* slim scrollbars */
  *::-webkit-scrollbar { width: 0; height: 0; }
</style>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>

<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- reused Calm data + logic layer -->
<script src="calm/data.js"></script>
<script src="https://unpkg.com/lucide@0.460.0/dist/umd/lucide.js"></script>

<!-- mobile UI layer -->

</head>

</html>
